<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Hostel Management{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem 1.5rem; line-height: 1.5; color: #1a1a1a; }
    a { color: #0b57d0; }
    .messages { list-style: none; padding: 0; margin: 0 0 1rem; }
    .messages li { padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.35rem; }
    .messages .error { background: #fde8e8; color: #8b1a1a; }
    .messages .success { background: #e8f5e9; color: #1b5e20; }
    .messages .info { background: #e3f2fd; color: #0d47a1; }
    table { border-collapse: collapse; width: 100%; max-width: 960px; margin-top: 0.75rem; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f5f5f5; }
    h1 { font-size: 1.35rem; }
    h2 { font-size: 1.1rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul class="messages">
        {% for category, message in messages %}
          <li class="{{ category }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  {% block body %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Place Laundry Order{% endblock %}

{% block content %}
<div class="hms-welcome-header">
  <h2 class="fw-bold mb-1">New Laundry Order</h2>
  <p class="text-muted mb-0">Fill in the details for your new laundry order.</p>
</div>

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card hms-card border-0 shadow-sm mt-3 mb-5">
      <div class="card-body p-4 p-md-5">
        <form method="post" action="{{ url_for('student.new_laundry') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          
          <div class="mb-4">
            <label class="form-label fw-bold small text-muted">Weight (kg) <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="number" step="0.1" name="weight" class="form-control bg-light border-0 shadow-none" placeholder="e.g. 2.5" min="0.1" max="20" required>
              <span class="input-group-text bg-light border-0 text-muted">kg</span>
            </div>
            <div class="form-text smallest">Maximum limit is 20 kg per order.</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold small text-muted">Items Overview <span class="text-danger">*</span></label>
            <textarea name="items" class="form-control bg-light border-0 shadow-none" rows="3" placeholder="e.g. 5 Shirts, 2 Jeans, 1 Bedsheet" required></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold small text-muted">Pickup Date</label>
            <input type="date" name="pickup_date" class="form-control bg-light border-0 shadow-none" min="{{ today }}">
            <div class="form-text smallest">Leave blank if submitting today.</div>
          </div>

          <div class="mb-5">
            <label class="form-label fw-bold small text-muted">Special Instructions</label>
            <textarea name="special_instructions" class="form-control bg-light border-0 shadow-none" rows="2" maxlength="500" placeholder="e.g. Wash white clothes separately..."></textarea>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <a href="{{ url_for('student.laundry_history') }}" class="btn btn-light rounded-pill px-4 shadow-sm text-secondary fw-medium">Cancel</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">
              <i class="bi bi-send-fill me-2"></i>Place Order
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

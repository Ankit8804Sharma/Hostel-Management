{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
      <div class="mb-4">
        <i class="bi bi-gear-fill text-warning spinning" style="font-size: 6rem; display: inline-block;"></i>
      </div>
      <h1 class="display-4 fw-bold text-dark mb-3">500</h1>
      <h2 class="h4 fw-semibold text-muted mb-4">Oops! Something went wrong on our end.</h2>
      <p class="text-secondary mb-5">Our technical team has been notified. Please try again in a few minutes.</p>
      
      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">
           <i class="bi bi-house-door me-2"></i>Go to Home
        </a>
        <button onclick="window.location.reload()" class="btn btn-outline-warning btn-lg px-5 rounded-pill">
           <i class="bi bi-arrow-clockwise me-2"></i>Refresh Page
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes spinning {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .spinning {
    animation: spinning 4s linear infinite;
  }
</style>
{% endblock %}

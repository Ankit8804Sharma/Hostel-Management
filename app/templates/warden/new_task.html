{% extends "base.html" %}
{% block title %}Create New Task{% endblock %}

{% block content %}
<div class="hms-welcome-header">
  <h2 class="fw-bold mb-1">Assign Maintenance Task</h2>
  <p class="text-muted mb-0">Create a new task and assign it to a staff member for resolution.</p>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card hms-card">
      <div class="card-header bg-white border-0 py-3">
        <h5 class="fw-bold mb-0"><i class="bi bi-list-task me-2 text-primary"></i>Task Details</h5>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="description" class="form-label small fw-bold text-muted">Task Description</label>
            <textarea class="form-control border-0 bg-light" id="description" name="description" rows="5" required placeholder="Describe the maintenance task..."></textarea>
          </div>
          <div class="mb-4">
            <label for="staff_id" class="form-label small fw-bold text-muted">Assign To</label>
            <select class="form-select border-0 bg-light" id="staff_id" name="staff_id" required>
              <option value="" selected disabled>Select staff member</option>
              {% for s in staff_members %}
              <option value="{{ s.staff_id }}">{{ s.name }} ({{ s.designation }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex align-items-center justify-content-between">
            <a href="{{ url_for('warden.dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
            <button type="submit" class="btn btn-primary rounded-pill px-5 shadow">Assign Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

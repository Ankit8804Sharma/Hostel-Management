{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-primary bg-opacity-10 text-primary d-inline-flex p-3 rounded-circle mb-3">
            <i class="bi bi-key fs-2"></i>
          </div>
          <h2 class="fw-bold">Forgot Password</h2>
          <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <form method="post" action="{% if user_type == 'staff' %}{{ url_for('auth.forgot_password_staff') }}{% else %}{{ url_for('auth.forgot_password_student') }}{% endif %}" class="needs-validation">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="mb-4">
            <label for="email" class="form-label fw-medium"><i class="bi bi-envelope me-1 text-primary"></i>Email Address</label>
            <input type="email" class="form-control form-control-lg bg-light border-0 shadow-none" id="email" name="email" required autofocus placeholder="name@example.com">
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm fw-bold">Send Reset Link</button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
          <a href="{% if user_type == 'staff' %}{{ url_for('auth.login_staff') }}{% else %}{{ url_for('auth.login_student') }}{% endif %}" class="text-decoration-none text-muted small fw-medium">
            <i class="bi bi-arrow-left me-1"></i>Back to Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

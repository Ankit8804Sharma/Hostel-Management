{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Reset Password</h2>
          <p class="text-muted">Please enter your new password below.</p>
        </div>

        <form method="post" id="resetPasswordForm" class="needs-validation">
    {{ form.hidden_tag() if form else '' }}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          
          <div class="mb-3">
            <label for="password" class="form-label fw-medium"><i class="bi bi-lock me-1 text-primary"></i>New Password</label>
            <input type="password" class="form-control form-control-lg bg-light border-0 shadow-none" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
          </div>
          
          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-medium"><i class="bi bi-lock me-1 text-primary"></i>Confirm Password</label>
            <input type="password" class="form-control form-control-lg bg-light border-0 shadow-none" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Repeat your new password">
            <div class="invalid-feedback" id="passwordFeedback">Passwords do not match.</div>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm fw-bold">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
    const pwd = document.getElementById('password');
    const pwdConfirm = document.getElementById('confirm_password');
    if (pwd.value !== pwdConfirm.value) {
      e.preventDefault();
      pwdConfirm.setCustomValidity("Passwords do not match");
      document.getElementById('passwordFeedback').style.display = 'block';
    } else {
      pwdConfirm.setCustomValidity("");
      document.getElementById('passwordFeedback').style.display = 'none';
    }
  });

  document.getElementById('confirm_password').addEventListener('input', function() {
    this.setCustomValidity("");
    document.getElementById('passwordFeedback').style.display = 'none';
  });
</script>
{% endblock %}

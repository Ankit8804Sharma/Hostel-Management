{% extends "base.html" %}
{% block title %}Student login{% endblock %}
{% block body %}
<h1>Student login</h1>
<form method="post">
  {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
  <p><label>Email<br><input name="email" type="email" required autocomplete="username"></label></p>
  <p><label>Password<br><input name="password" type="password" required autocomplete="current-password"></label></p>
  <p><label><input type="checkbox" name="remember" value="1"> Remember me</label></p>
  <p><button type="submit">Log in</button></p>
</form>
<p><a href="{{ url_for('auth.register_student') }}">Register</a> · <a href="{{ url_for('auth.login_staff') }}">Staff login</a></p>
{% endblock %}

{% extends "base.html" %}
{% block title %}Student registration{% endblock %}
{% block content %}
<div class="auth-center d-flex align-items-center py-4 py-md-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success bg-opacity-10 text-success p-3 mb-3">
                <i class="bi bi-person-plus-fill fs-2"></i>
              </div>
              <h1 class="h4 fw-semibold mb-1">Create student account</h1>
              <p class="text-muted small mb-0">Register to access the hostel portal</p>
            </div>
            <form method="post" novalidate>
              <div class="mb-3">
                <label class="form-label" for="name">Full name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                  <input class="form-control border-start-0" id="name" name="name" required autocomplete="name" placeholder="Your full name">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                  <input class="form-control border-start-0" id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="phone">Phone</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                  <input class="form-control border-start-0" id="phone" name="phone" required autocomplete="tel" placeholder="Phone number">
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                  <input class="form-control border-start-0" id="password" name="password" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-check-lg me-2"></i>Register
              </button>
            </form>
            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
              Already have an account?
              <a href="{{ url_for('auth.login_student') }}" class="text-decoration-none fw-medium">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

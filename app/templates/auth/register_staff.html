{% extends "base.html" %}
{% block title %}Staff registration{% endblock %}
{% block content %}
<div class="auth-center d-flex align-items-center py-4 py-md-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-secondary bg-opacity-10 text-secondary p-3 mb-3">
                <i class="bi bi-briefcase fs-2"></i>
              </div>
              <h1 class="h4 fw-semibold mb-1">Staff registration</h1>
              <p class="text-muted small mb-0">Create your staff portal account</p>
            </div>
            <form method="post" novalidate>
    {{ form.hidden_tag() if form else '' }}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
              <div class="mb-3">
                <label class="form-label" for="name">Full name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                  <input class="form-control border-start-0" id="name" name="name" required autocomplete="name" placeholder="Full name">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                  <input class="form-control border-start-0" id="email" name="email" type="email" required autocomplete="email" placeholder="work@example.com">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="contact_no">Contact number</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone"></i></span>
                  <input class="form-control border-start-0" id="contact_no" name="contact_no" required autocomplete="tel" placeholder="Contact number">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="designation">Designation</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-award"></i></span>
                  <input class="form-control border-start-0" id="designation" name="designation" required placeholder="e.g. Maintenance">
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                  <input class="form-control border-start-0" id="password" name="password" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
                </div>
              </div>
              <button type="submit" class="btn btn-dark w-100 py-2">
                <i class="bi bi-check-lg me-2"></i>Register
              </button>
            </form>
            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
              Already have an account?
              <a href="{{ url_for('auth.login_staff') }}" class="text-decoration-none fw-medium">Staff sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

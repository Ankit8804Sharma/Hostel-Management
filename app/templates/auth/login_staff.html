{% extends "base.html" %}
{% block title %}Staff login{% endblock %}
{% block content %}
<div class="auth-center d-flex align-items-center py-4 py-md-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5 col-xl-4">
        <div class="card border-0 shadow">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-dark bg-opacity-10 text-dark p-3 mb-3">
                <i class="bi bi-briefcase-fill fs-2"></i>
              </div>
              <h1 class="h4 fw-semibold mb-1">Staff login</h1>
              <p class="text-muted small mb-0">Sign in with your staff credentials</p>
            </div>
            <form method="post" novalidate>
              {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                  <input class="form-control border-start-0" id="email" name="email" type="email" required autocomplete="username" placeholder="you@example.com">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                  <input class="form-control border-start-0" id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
              </div>
              <div class="mb-4 form-check">
                <input class="form-check-input" type="checkbox" name="remember" value="1" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
              </div>
              <button type="submit" class="btn btn-dark w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Log in
              </button>
            </form>
            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
              <a href="{{ url_for('auth.register_staff') }}" class="text-decoration-none">Register as staff</a>
              <span class="mx-2">·</span>
              <a href="{{ url_for('auth.login_student') }}" class="text-decoration-none">Student login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
